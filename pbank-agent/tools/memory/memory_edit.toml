command = "./scripts/memory_edit.sh"
description = """
Replace a string in a memory file. MUST read the file first to get exact strings to change.
Call memory_list first to see available files and their char limits.
"""

[user]
type = "string"
return = "{{$user}}"

[file]
description = "Name of the memory file to edit (without .md extension, e.g. core)"
type = "string"
required = true

[old]
description = "Exact string to find"
type = "string"
required = true

[new]
description = "Replacement string"
type = "string"
required = true
